apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cradle-website-ingress
  namespace: cradle
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx # Explicitly define your controller
  tls:
    - hosts:
        - web.cradle.harrisconsult.org
      secretName: cradle-website-tls # Cert-manager will create this secret
  rules:
    - host: cradle.harrisconsult.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cradle-website # MUST match the metadata.name of your Service
                port:
                  number: 80
