apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blue-vision-api-ingress
  namespace: blue-vision
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx # Explicitly define your controller
  tls:
  - hosts:
    - api.bluevisionltdcom
    secretName: blue-vision-api-tls # Cert-manager will create this secret
  rules:
  - host: api.bluevisionltd.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blue-vision-api # MUST match the metadata.name of your Service
            port:
              number: 80