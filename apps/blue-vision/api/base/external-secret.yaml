apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: blue-vision-api-sync
  namespace: blue-vision
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  target:
    name: blue-vision-secrets
    creationPolicy: Merge
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        MONGO_URI: "mongodb://{{ .MONGO_USER }}:{{ .MONGO_PASSWORD }}@{{ .MONGO_HOST }}:{{ .MONGO_PORT }}/bluevision?authSource=admin"
        S3_ENDPOINT: "https://s3.churchlify.com"
        S3_BUCKET: "bv-data"
        S3_USE_SSL: "false"
        S3_REGION: "us-east-1"
        S3_PORT: "9000"
        FLW_PUBLIC_KEY: "FLWPUBK_TEST-a43bef4062b1e6584f108e1f4f0ce742-X"
        FLW_SECRET_KEY: "FLWSECK_TEST-59e49ad225105bdda110e93924fee4e0-X"

  data:
    - secretKey: MONGO_USER
      remoteRef:
        key: global-db-secrets 
        property: MONGO_USER
    - secretKey: MONGO_PASSWORD
      remoteRef:
        key: global-db-secrets
        property: MONGO_PASSWORD
    - secretKey: MONGO_HOST
      remoteRef:
        key: global-db-secrets
        property: MONGO_HOST
    - secretKey: MONGO_PORT
      remoteRef:
        key: global-db-secrets
        property: MONGO_PORT
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: global-db-secrets
        property: MINIO_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: global-db-secrets
        property: MINIO_SECRET_KEY