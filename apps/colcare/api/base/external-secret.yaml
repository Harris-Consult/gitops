apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: colcare-api-sync
  namespace: colcare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore

  target:
    name: colcare-secrets
    creationPolicy: Merge
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        DATABASE_URL: "postgresql://{{ .PGSQL_USER }}:{{ .PGSQL_PASSWORD }}@{{ .PGSQL_HOST }}:{{ .PGSQL_PORT }}/colcare?schema=public"
        JWT_EXPIRES_IN: "7d"
        REDIS_URL: "redis://{{ .REDIS_HOST }}:{{ .REDIS_PORT }}"
        S3_ENDPOINT: "http://{{ .MINIO_HOST }}:{{ .MINIO_PORT }}"
        S3_REGION: "us-east-1"
        S3_BUCKET: "colcare-data"
        S3_FORCE_PATH_STYLE: "true"
        S3_ACCESS_KEY: { { .MINIO_ACCESS_KEY } }
        S3_SECRET_KEY: { { .MINIO_SECRET_KEY } }
        TURN_URL: "turn.churchlify.com"
        TURN_USER_EXPIRY_SEC: "600"
        TURN_MIN_PORT: "49160"
        TURN_MAX_PORT: "49200"
        MEDIASOUP_MIN_PORT: "42000"
        MEDIASOUP_MAX_PORT: "42100"

  data:
    - secretKey: PGSQL_USER
      remoteRef:
        key: global-db-secrets
        property: PGSQL_USER

    - secretKey: PGSQL_PASSWORD
      remoteRef:
        key: global-db-secrets
        property: PGSQL_PASSWORD

    - secretKey: PGSQL_HOST
      remoteRef:
        key: global-db-secrets
        property: PGSQL_HOST

    - secretKey: PGSQL_PORT
      remoteRef:
        key: global-db-secrets
        property: PGSQL_PORT

    - secretKey: REDIS_HOST
      remoteRef:
        key: global-db-secrets
        property: REDIS_HOST

    - secretKey: REDIS_PORT
      remoteRef:
        key: global-db-secrets
        property: REDIS_PORT

    - secretKey: MINIO_HOST
      remoteRef:
        key: global-db-secrets
        property: MINIO_HOST

    - secretKey: MINIO_PORT
      remoteRef:
        key: global-db-secrets
        property: MINIO_PORT

    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: global-db-secrets
        property: MINIO_ACCESS_KEY

    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: global-db-secrets
        property: MINIO_SECRET_KEY
