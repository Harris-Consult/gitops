apiVersion: apps/v1
kind: Deployment
metadata:
  name: colcare-api
  namespace: colcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: colcare-api
  template:
    metadata:
      labels:
        app: colcare-api
    spec:
      initContainers:
        - name: db-init
          image: postgres:15
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for DB..."
              until pg_isready -h pgsql-postgresql.platform.svc.cluster.local -p 5432; do
                sleep 2
              done
              echo "DB is ready!"

        - name: prisma-migrate
          image: ghcr.io/harris-consult/colcare-api:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Running prisma migrations"
              npx prisma migrate deploy

      containers:
        - name: api
          image: ghcr.io/harris-consult/colcare-api:latest
          imagePullPolicy: Always
          command: ["node", "dist/src/server.js"]
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: colcare-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
