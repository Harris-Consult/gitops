apiVersion: apps/v1
kind: Deployment
metadata:
  name: colcare-api
  namespace: colcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: colcare-api
  template:
    metadata:
      labels:
        app: colcare-api
    spec:
      containers:
        - name: api
          image: ghcr.io/harris-consult/colcare-api:latest
          imagePullPolicy: Always
          command: ["node", "dist/src/server.js"]
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: colcare-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
