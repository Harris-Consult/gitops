apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: colcare-app-ingress
  namespace: colcare
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.colcare.harrisconsult.org
      secretName: colcare-app-tls
  rules:
    - host: app.colcare.harrisconsult.org
      http:
        paths:
          # 1. Serve static assets normally
          - path: /assets/(.*)
            pathType: Prefix
            backend:
              service:
                name: colcare-app
                port:
                  number: 80

          - path: /favicon.ico
            pathType: Prefix
            backend:
              service:
                name: colcare-app
                port:
                  number: 80

          # 2. Rewrite SPA routes ONLY
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: colcare-app
                port:
                  number: 80
            # IMPORTANT: rewrite only SPA routes
            # NOT static assets
            annotations:
              nginx.ingress.kubernetes.io/rewrite-target: /index.html
